spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/music_request_db
    driver-class-name: org.postgresql.Driver
    username: user
    password: secret

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

server:
  port: 8080
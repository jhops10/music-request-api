spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/music_request_db
    driver-class-name: org.postgresql.Driver
    username: user
    password: secret

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: admin
    password: admin123
    connection-timeout: 5000

  springdoc:
    api-docs:
      path: /api-docs
    swagger-ui:
      path: /swagger-ui.html
      operationsSorter: method
      tagsSorter: alpha
      tryItOutEnabled: true
      filter: true
    show-actuator: true

server:
  port: 8080